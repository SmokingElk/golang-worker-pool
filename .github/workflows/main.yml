name: Worker Pool tests

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    container: 
      image: golang:1.24.3-alpine
      volumes:
        - ${{ github.workspace }}:/go/src/app

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        path: /go/src/app

    - name: Run tests
      run: go test -v -count=1 ./internal/worker_pull/